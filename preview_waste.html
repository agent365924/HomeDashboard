<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waste Bin Preview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500&family=Barlow+Semi+Condensed:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #e8e4dc;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    gap: 24px;
  }

  h1 {
    font-size: 14px;
    font-weight: 500;
    color: #555;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── House scene ─────────────────────────────────────── */
  .scene {
    position: relative;
    width: 480px;
    height: 480px;
    border-radius: 16px;
    overflow: hidden;
    background: #0a0c10;
  }

  .house-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* ── Waste bins — per-bin absolute positioning ───────── */
  .waste-bins {
    position: absolute;
    inset: 0;
    z-index: 5;
    pointer-events: none;
  }

  .waste-bin {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  #bin-restmuell   { z-index: 3; }
  #bin-gruengut    { z-index: 1; }
  #bin-gelber-sack { z-index: 2; }

  .bin-icon {
    width: 54px;
    height: 72px;
    filter: drop-shadow(0 3px 8px rgba(0,0,0,0.65));
  }

  .bin-date {
    font-family: 'Barlow Semi Condensed', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: #e8e4dc;
    text-shadow: 0 1px 3px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.6);
    white-space: nowrap;
    line-height: 1;
    transform: translateY(5px);
  }

  .bin-date.bin-today    { color: #facc15; }
  .bin-date.bin-tomorrow { color: #fb923c; }

  /* ── Controls ────────────────────────────────────────── */
  .controls {
    width: 480px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .control-group {
    background: #161b25;
    border: 1px solid #2a3040;
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .control-group label {
    font-size: 12px;
    font-weight: 500;
    color: #8a7868;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .control-group label img {
    width: 22px;
    height: 29px;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
  }

  .btn-row {
    display: flex;
    gap: 8px;
  }

  .btn-row button {
    flex: 1;
    padding: 8px 0;
    border-radius: 8px;
    border: 1px solid #2a3040;
    background: #0d1117;
    color: #555;
    font-family: 'Barlow Semi Condensed', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }

  .btn-row button:hover { background: #1e2330; color: #e8e4dc; }

  .btn-row button.active-heute  { background: #2a1a0a; color: #fb923c; border-color: #fb923c55; }
  .btn-row button.active-morgen { background: #2a2800; color: #facc15; border-color: #facc1555; }
  .btn-row button.active-off    { background: #1e2330; color: #e8e4dc; border-color: #4a5060; }

  /* ── Position sliders ────────────────────────────────── */
  .pos-group {
    background: #161b25;
    border: 1px solid #2a3040;
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .pos-group h2 {
    font-size: 12px;
    font-weight: 500;
    color: #8a7868;
    letter-spacing: 0.05em;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: #555;
  }

  .slider-row span:first-child {
    width: 80px;
    color: #8a7868;
  }

  .slider-row input[type=range] {
    flex: 1;
    accent-color: #4ade80;
    height: 4px;
    cursor: pointer;
  }

  .slider-row .val {
    width: 44px;
    text-align: right;
    color: #e8e4dc;
    font-family: 'Barlow Semi Condensed', sans-serif;
    font-size: 12px;
  }

  .css-output {
    background: #0d1117;
    border: 1px solid #2a3040;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 11px;
    font-family: monospace;
    color: #4ade80;
    line-height: 1.6;
    white-space: pre;
    user-select: all;
  }
</style>
</head>
<body>

<h1>Waste Bin Preview</h1>

<!-- House scene -->
<div class="scene">
  <img class="house-img" src="house_day.png" alt="House">

  <div class="waste-bins" id="waste-bins" style="display:flex">
    <div class="waste-bin bin-slot-1" id="bin-restmuell">
      <span class="bin-date" id="lbl-restmuell">—</span>
      <img class="bin-icon" src="waste.png" alt="Restmüll">
    </div>
    <div class="waste-bin bin-slot-2" id="bin-gruengut">
      <span class="bin-date" id="lbl-gruengut">—</span>
      <img class="bin-icon" src="paper.png" alt="Grüngutsammlung">
    </div>
    <div class="waste-bin bin-slot-3" id="bin-gelber-sack">
      <span class="bin-date" id="lbl-gelber-sack">—</span>
      <img class="bin-icon" src="recycling.png" alt="Gelber Sack">
    </div>
  </div>
</div>

<!-- Bin state controls -->
<div class="controls">

  <div class="control-group">
    <label><img src="waste.png"> Restmüll</label>
    <div class="btn-row" id="btns-restmuell">
      <button onclick="setState('restmuell','heute',this)">heute</button>
      <button onclick="setState('restmuell','morgen',this)">morgen</button>
      <button onclick="setState('restmuell','off',this)" class="active-off">aus</button>
    </div>
  </div>

  <div class="control-group">
    <label><img src="paper.png"> Grüngutsammlung</label>
    <div class="btn-row" id="btns-gruengut">
      <button onclick="setState('gruengut','heute',this)">heute</button>
      <button onclick="setState('gruengut','morgen',this)">morgen</button>
      <button onclick="setState('gruengut','off',this)" class="active-off">aus</button>
    </div>
  </div>

  <div class="control-group">
    <label><img src="recycling.png"> Gelber Sack</label>
    <div class="btn-row" id="btns-gelber-sack">
      <button onclick="setState('gelber_sack','heute',this)">heute</button>
      <button onclick="setState('gelber_sack','morgen',this)">morgen</button>
      <button onclick="setState('gelber_sack','off',this)" class="active-off">aus</button>
    </div>
  </div>

  <!-- Per-bin position controls -->
  <div class="pos-group">
    <h2>Restmüll &nbsp;<img src="waste.png" style="height:18px;vertical-align:middle;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))"></h2>
    <div class="slider-row">
      <span>Links</span>
      <input type="range" id="sl-b1-x" min="0" max="480" value="296" oninput="updatePos()">
      <span class="val" id="val-b1-x">296px</span>
    </div>
    <div class="slider-row">
      <span>Unten</span>
      <input type="range" id="sl-b1-y" min="0" max="480" value="82" oninput="updatePos()">
      <span class="val" id="val-b1-y">82px</span>
    </div>
  </div>

  <div class="pos-group">
    <h2>Grüngutsammlung &nbsp;<img src="paper.png" style="height:18px;vertical-align:middle;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))"></h2>
    <div class="slider-row">
      <span>Links</span>
      <input type="range" id="sl-b2-x" min="0" max="480" value="322" oninput="updatePos()">
      <span class="val" id="val-b2-x">322px</span>
    </div>
    <div class="slider-row">
      <span>Unten</span>
      <input type="range" id="sl-b2-y" min="0" max="480" value="106" oninput="updatePos()">
      <span class="val" id="val-b2-y">106px</span>
    </div>
  </div>

  <div class="pos-group">
    <h2>Gelber Sack &nbsp;<img src="recycling.png" style="height:18px;vertical-align:middle;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))"></h2>
    <div class="slider-row">
      <span>Links</span>
      <input type="range" id="sl-b3-x" min="0" max="480" value="348" oninput="updatePos()">
      <span class="val" id="val-b3-x">348px</span>
    </div>
    <div class="slider-row">
      <span>Unten</span>
      <input type="range" id="sl-b3-y" min="0" max="480" value="130" oninput="updatePos()">
      <span class="val" id="val-b3-y">130px</span>
    </div>
  </div>

  <div class="css-output" id="css-out"></div>
</div>

<script>
  const state = {
    restmuell:   'off',
    gruengut:    'off',
    gelber_sack: 'off',
  };

  const binIds = {
    restmuell:   { el: 'bin-restmuell',   lbl: 'lbl-restmuell',   btns: 'btns-restmuell' },
    gruengut:    { el: 'bin-gruengut',    lbl: 'lbl-gruengut',    btns: 'btns-gruengut' },
    gelber_sack: { el: 'bin-gelber-sack', lbl: 'lbl-gelber-sack', btns: 'btns-gelber-sack' },
  };

  function setState(key, val, clickedBtn) {
    state[key] = val;

    const btnsEl = document.getElementById(binIds[key].btns);
    btnsEl.querySelectorAll('button').forEach(b => b.className = '');
    const map = { heute: 'active-heute', morgen: 'active-morgen', off: 'active-off' };
    clickedBtn.className = map[val];

    const lblEl = document.getElementById(binIds[key].lbl);
    lblEl.className = 'bin-date';
    if (val === 'heute')       { lblEl.textContent = 'heute';  lblEl.classList.add('bin-today'); }
    else if (val === 'morgen') { lblEl.textContent = 'morgen'; lblEl.classList.add('bin-tomorrow'); }
    else                       { lblEl.textContent = '—'; }

    document.getElementById(binIds[key].el).style.display = val === 'off' ? 'none' : '';
    document.getElementById('waste-bins').style.display =
      Object.values(state).some(s => s !== 'off') ? '' : 'none';
  }

  const SLIDERS = [
    { id: 'sl-b1-x', valId: 'val-b1-x', key: 'pw-b1-x', def: '296', binId: 'bin-restmuell',   prop: 'left' },
    { id: 'sl-b1-y', valId: 'val-b1-y', key: 'pw-b1-y', def: '82',  binId: 'bin-restmuell',   prop: 'bottom' },
    { id: 'sl-b2-x', valId: 'val-b2-x', key: 'pw-b2-x', def: '322', binId: 'bin-gruengut',    prop: 'left' },
    { id: 'sl-b2-y', valId: 'val-b2-y', key: 'pw-b2-y', def: '106', binId: 'bin-gruengut',    prop: 'bottom' },
    { id: 'sl-b3-x', valId: 'val-b3-x', key: 'pw-b3-x', def: '348', binId: 'bin-gelber-sack', prop: 'left' },
    { id: 'sl-b3-y', valId: 'val-b3-y', key: 'pw-b3-y', def: '130', binId: 'bin-gelber-sack', prop: 'bottom' },
  ];

  function updatePos() {
    const v = {};
    for (const s of SLIDERS) {
      v[s.id] = document.getElementById(s.id).value;
      document.getElementById(s.valId).textContent = v[s.id] + 'px';
      localStorage.setItem(s.key, v[s.id]);
      document.getElementById(s.binId).style[s.prop] = v[s.id] + 'px';
    }
    document.getElementById('css-out').textContent =
`#bin-restmuell   { left: ${v['sl-b1-x']}px; bottom: ${v['sl-b1-y']}px; }
#bin-gruengut    { left: ${v['sl-b2-x']}px; bottom: ${v['sl-b2-y']}px; }
#bin-gelber-sack { left: ${v['sl-b3-x']}px; bottom: ${v['sl-b3-y']}px; }`;
  }

  for (const s of SLIDERS) {
    const saved = localStorage.getItem(s.key);
    if (saved !== null) document.getElementById(s.id).value = saved;
  }
  updatePos();
</script>
</body>
</html>
