<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animation Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d0d;
    color: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 32px 16px;
    gap: 32px;
  }

  body.light-mode {
    background: #f0ebe3;
    color: #1a1a1a;
  }

  h1 {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.4;
  }

  /* ── Scene ── */
  .scene {
    position: relative;
    width: 480px;
    height: 480px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .house {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .house img {
    width: 480px;
    height: 480px;
    object-fit: contain;
    user-select: none;
    pointer-events: none;
  }

  #scene-anim {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 480px; height: 480px;
    overflow: visible;
    pointer-events: none;
  }

  /* ── Cable ── */
  /* Gap filler — static dim dashes that sit in between the animated bright dots */
  .cable-gap {
    fill: none;
    stroke: #4e3e30;
    stroke-linecap: round;
    stroke-width: 20;
    filter: url(#f-gap-blur);
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  body.light-mode .cable-gap { stroke: #ecdfd0; }

  #scene-anim.cable-export .cable-gap,
  #scene-anim.cable-import .cable-gap { opacity: 0.3; }

  .cable-halo, .cable-trail {
    fill: none;
    stroke: #8A7A6A;
    stroke-linecap: round;
    stroke-dasharray: 44 64;
    stroke-width: 20;
    filter: url(#f-cable-blur);
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  body.light-mode .cable-halo,
  body.light-mode .cable-trail { stroke: #FFF4E8; }

  /* Main dot */
  #scene-anim.cable-export .cable-halo { opacity: 0.35; animation: cable-out   2s linear infinite; }
  #scene-anim.cable-import .cable-halo { opacity: 0.35; animation: cable-in    2s linear infinite; }

  /* Trail layers — each shifted N units behind along the path */
  #scene-anim.cable-export .cable-trail-1 { opacity: 0.22; animation: cable-out-t1 2s linear infinite; }
  #scene-anim.cable-export .cable-trail-2 { opacity: 0.12; animation: cable-out-t2 2s linear infinite; }
  #scene-anim.cable-export .cable-trail-3 { opacity: 0.05; animation: cable-out-t3 2s linear infinite; }

  #scene-anim.cable-import .cable-trail-1 { opacity: 0.22; animation: cable-in-t1  2s linear infinite; }
  #scene-anim.cable-import .cable-trail-2 { opacity: 0.12; animation: cable-in-t2  2s linear infinite; }
  #scene-anim.cable-import .cable-trail-3 { opacity: 0.05; animation: cable-in-t3  2s linear infinite; }

  /* Period = 44+64 = 108. Trail-N adds N to dashoffset so it lags N units behind on the spline. */
  @keyframes cable-out    { from { stroke-dashoffset: 108; } to { stroke-dashoffset: 0;   } }
  @keyframes cable-out-t1 { from { stroke-dashoffset: 124; } to { stroke-dashoffset: 16;  } }
  @keyframes cable-out-t2 { from { stroke-dashoffset: 140; } to { stroke-dashoffset: 32;  } }
  @keyframes cable-out-t3 { from { stroke-dashoffset: 156; } to { stroke-dashoffset: 48;  } }

  @keyframes cable-in     { from { stroke-dashoffset: 0;   } to { stroke-dashoffset: 108; } }
  @keyframes cable-in-t1  { from { stroke-dashoffset: -16; } to { stroke-dashoffset: 92;  } }
  @keyframes cable-in-t2  { from { stroke-dashoffset: -32; } to { stroke-dashoffset: 76;  } }
  @keyframes cable-in-t3  { from { stroke-dashoffset: -48; } to { stroke-dashoffset: 60;  } }

  /* ── Battery empty bars (always shown, opaque dark grey, no glow) ── */
  .bat-bar-empty {
    fill: none;
    stroke: #3a3a3a;
    stroke-width: 10;
    stroke-linecap: round;
    opacity: 1;
  }

  body.light-mode .bat-bar-empty { stroke: #3a3a3a; }

  /* ── Battery lit bars ── */
  .bat-bar {
    fill: none;
    stroke: #4ade80;
    stroke-width: 10;
    stroke-linecap: round;
    opacity: 0;
    filter: url(#f-bat-glow);
    transition: opacity 0.8s ease;
  }

  .bat-bar.bar-lit { opacity: 1; }

  #scene-anim.bat-charging .bat-bar.bar-lit {
    animation: bat-pulse 2.2s ease-in-out infinite;
  }
  #scene-anim.bat-charging .bat-bar.bar-lit:nth-child(2) { animation-delay: 0.15s; }
  #scene-anim.bat-charging .bat-bar.bar-lit:nth-child(3) { animation-delay: 0.30s; }

  @keyframes bat-pulse {
    0%, 100% { stroke: #1a5c30; }
    50%       { stroke: #86efac; }
  }

  body.light-mode .bat-bar { stroke: #00e676; }
  body.light-mode .bat-bar.bar-lit { opacity: 1; }

  /* ── Controls ── */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 480px;
  }

  .control-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .control-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    opacity: 0.5;
    width: 100px;
    flex-shrink: 0;
  }

  .btn-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  button {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.10);
    color: inherit;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    letter-spacing: 0.02em;
  }

  body.light-mode button {
    background: rgba(0,0,0,0.05);
    border-color: rgba(0,0,0,0.12);
  }

  button:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.2);
  }

  body.light-mode button:hover {
    background: rgba(0,0,0,0.10);
  }

  button.active {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.4);
    color: #fff;
  }

  body.light-mode button.active {
    background: rgba(0,0,0,0.12);
    border-color: rgba(0,0,0,0.35);
    color: #000;
  }

  .divider {
    width: 480px;
    height: 1px;
    background: rgba(255,255,255,0.07);
  }

  body.light-mode .divider {
    background: rgba(0,0,0,0.08);
  }
</style>
</head>
<body id="body">

<h1>House Animation Preview</h1>

<!-- Scene -->
<div class="scene">
  <div class="house">
    <img src="house_day.png" alt="House" id="house-img">
  </div>

  <svg id="scene-anim" viewBox="0 0 1069 1069" aria-hidden="true">
    <defs>
      <filter id="f-cable-blur" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur stdDeviation="5"/>
      </filter>
      <filter id="f-gap-blur" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur stdDeviation="2.5"/>
      </filter>
      <filter id="f-bat-glow" x="-200%" y="-200%" width="500%" height="500%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    <path class="cable-gap"
      d="M320.5 831.5C320.166 839.582 320.566 851.256 333 863C351 880 408.573 917.902 463.5 938.5C527.5 962.5 587.458 972.166 640.859 956.752C688.5 943 690.799 923.895 689 916C687.201 908.105 685.511 903.5 684.5 895.5C684 891.543 686 882.102 698 876C710 869.898 832.5 809 911.5 766.5C922 761.167 940 743.5 940 705.5C942 644 941.667 642.833 942 639.5"/>
    <path class="cable-trail cable-trail-3"
      d="M320.5 831.5C320.166 839.582 320.566 851.256 333 863C351 880 408.573 917.902 463.5 938.5C527.5 962.5 587.458 972.166 640.859 956.752C688.5 943 690.799 923.895 689 916C687.201 908.105 685.511 903.5 684.5 895.5C684 891.543 686 882.102 698 876C710 869.898 832.5 809 911.5 766.5C922 761.167 940 743.5 940 705.5C942 644 941.667 642.833 942 639.5"/>
    <path class="cable-trail cable-trail-2"
      d="M320.5 831.5C320.166 839.582 320.566 851.256 333 863C351 880 408.573 917.902 463.5 938.5C527.5 962.5 587.458 972.166 640.859 956.752C688.5 943 690.799 923.895 689 916C687.201 908.105 685.511 903.5 684.5 895.5C684 891.543 686 882.102 698 876C710 869.898 832.5 809 911.5 766.5C922 761.167 940 743.5 940 705.5C942 644 941.667 642.833 942 639.5"/>
    <path class="cable-trail cable-trail-1"
      d="M320.5 831.5C320.166 839.582 320.566 851.256 333 863C351 880 408.573 917.902 463.5 938.5C527.5 962.5 587.458 972.166 640.859 956.752C688.5 943 690.799 923.895 689 916C687.201 908.105 685.511 903.5 684.5 895.5C684 891.543 686 882.102 698 876C710 869.898 832.5 809 911.5 766.5C922 761.167 940 743.5 940 705.5C942 644 941.667 642.833 942 639.5"/>
    <path class="cable-halo"
      d="M320.5 831.5C320.166 839.582 320.566 851.256 333 863C351 880 408.573 917.902 463.5 938.5C527.5 962.5 587.458 972.166 640.859 956.752C688.5 943 690.799 923.895 689 916C687.201 908.105 685.511 903.5 684.5 895.5C684 891.543 686 882.102 698 876C710 869.898 832.5 809 911.5 766.5C922 761.167 940 743.5 940 705.5C942 644 941.667 642.833 942 639.5"/>
    <g id="bat-empty">
      <path class="bat-bar-empty" d="M249.5 720.5L271.5 730"/>
      <path class="bat-bar-empty" d="M249.5 752L271.5 761.5"/>
      <path class="bat-bar-empty" d="M249.5 782L271.5 791.5"/>
    </g>
    <g id="bat-lines">
      <path class="bat-bar" d="M249.5 720.5L271.5 730"/>
      <path class="bat-bar" d="M249.5 752L271.5 761.5"/>
      <path class="bat-bar" d="M249.5 782L271.5 791.5"/>
    </g>
  </svg>
</div>

<!-- Controls -->
<div class="controls">

  <div class="control-row">
    <span class="control-label">Day / Night</span>
    <div class="btn-group">
      <button id="btn-night" class="active" onclick="setMode('night')">Night</button>
      <button id="btn-day"   onclick="setMode('day')">Day</button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="control-row">
    <span class="control-label">Cable</span>
    <div class="btn-group">
      <button id="btn-cable-off"    class="active" onclick="setCable('off')">Off</button>
      <button id="btn-cable-export" onclick="setCable('export')">Export →</button>
      <button id="btn-cable-import" onclick="setCable('import')">← Import</button>
    </div>
  </div>

  <div class="control-row">
    <span class="control-label">Battery SOC</span>
    <div class="btn-group">
      <button id="btn-soc-0" class="active" onclick="setSoc(0)">0%</button>
      <button id="btn-soc-1" onclick="setSoc(1)">~33%</button>
      <button id="btn-soc-2" onclick="setSoc(2)">~66%</button>
      <button id="btn-soc-3" onclick="setSoc(3)">100%</button>
    </div>
  </div>

  <div class="control-row">
    <span class="control-label">Charging</span>
    <div class="btn-group">
      <button id="btn-charge-off" class="active" onclick="setCharging(false)">Off</button>
      <button id="btn-charge-on"  onclick="setCharging(true)">Charging</button>
    </div>
  </div>

</div>

<script>
  const anim    = document.getElementById('scene-anim');
  const houseImg = document.getElementById('house-img');
  const body    = document.getElementById('body');

  function clearActive(group) {
    group.forEach(id => document.getElementById(id).classList.remove('active'));
  }

  function setMode(mode) {
    clearActive(['btn-night','btn-day']);
    document.getElementById('btn-' + mode).classList.add('active');
    if (mode === 'day') {
      body.classList.add('light-mode');
      houseImg.src = 'house_day.png';
    } else {
      body.classList.remove('light-mode');
      houseImg.src = 'house_night.png';
    }
  }

  function setCable(state) {
    clearActive(['btn-cable-off','btn-cable-export','btn-cable-import']);
    document.getElementById('btn-cable-' + state).classList.add('active');
    anim.classList.remove('cable-export','cable-import');
    if (state === 'export') anim.classList.add('cable-export');
    if (state === 'import') anim.classList.add('cable-import');
  }

  function setSoc(bars) {
    clearActive(['btn-soc-0','btn-soc-1','btn-soc-2','btn-soc-3']);
    document.getElementById('btn-soc-' + bars).classList.add('active');
    const allBars = anim.querySelectorAll('.bat-bar');
    // bars fill bottom-up: bar[2]=bottom, bar[1]=mid, bar[0]=top
    allBars.forEach((bar, i) => {
      const idx = allBars.length - 1 - i; // 0=top bar, 2=bottom bar
      bar.classList.toggle('bar-lit', idx < bars);
    });
  }

  function setCharging(on) {
    clearActive(['btn-charge-off','btn-charge-on']);
    document.getElementById(on ? 'btn-charge-on' : 'btn-charge-off').classList.add('active');
    anim.classList.toggle('bat-charging', on);
  }

  // Build a mask that hides the first 10% of the cable path.
  // We sample points along that segment and draw a thick black stroke in a <mask>,
  // so the hide region follows the spline exactly.
  (function applyCableSkip() {
    const ns   = 'http://www.w3.org/2000/svg';
    const ref  = document.querySelector('.cable-halo');
    const L    = ref.getTotalLength();
    const skip = L * 0.001;

    // Continuous line: show from skip→end only
    document.querySelectorAll('.cable-gap').forEach(p => {
      p.style.strokeDasharray = `${L - skip} 99999`;
      p.style.strokeDashoffset = `${skip}`;
    });

    // Build mask in defs
    const defs    = anim.querySelector('defs');
    const maskEl  = document.createElementNS(ns, 'mask');
    maskEl.id     = 'm-cable-skip';

    const bg = document.createElementNS(ns, 'rect');
    bg.setAttribute('width',  '1069');
    bg.setAttribute('height', '1069');
    bg.setAttribute('fill',   'white');
    maskEl.appendChild(bg);

    // Sample the first 10% and draw a thick black stroke over it
    const steps  = 30;
    const pts    = [];
    for (let i = 0; i <= steps; i++) {
      const pt = ref.getPointAtLength((skip / steps) * i);
      pts.push(`${pt.x},${pt.y}`);
    }
    const hide = document.createElementNS(ns, 'polyline');
    hide.setAttribute('points',           pts.join(' '));
    hide.setAttribute('stroke',           'black');
    hide.setAttribute('stroke-width',     '32'); // covers stroke(20) + blur overflow
    hide.setAttribute('fill',             'none');
    hide.setAttribute('stroke-linecap',   'round');
    hide.setAttribute('stroke-linejoin',  'round');
    maskEl.appendChild(hide);

    defs.appendChild(maskEl);

    // Apply mask to every cable layer
    document.querySelectorAll('.cable-gap, .cable-halo, .cable-trail').forEach(p => {
      p.setAttribute('mask', 'url(#m-cable-skip)');
    });
  })();
</script>
</body>
</html>
